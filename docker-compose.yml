version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - ./redis_data:/data
    networks:
      - healthsharer
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: database
    user: root
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: Y
    expose:
      - "1433"
    volumes:
      - ./database/data:/var/opt/mssql/data
      - ./database/log:/var/opt/mssql/log
      - ./database/secrets:/var/opt/mssql/secrets
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthsharer
  postgresql:
    image: postgres:15
    container_name: firely-postgres
    environment:
      POSTGRES_DB: firely
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    expose:
      - "5432"
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - healthsharer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d firely"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  hapi-fhir-server:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir-server
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      # Database configuration
      spring.datasource.url: "jdbc:postgresql://postgresql:5432/firely"
      spring.datasource.username: "${POSTGRES_USER}"
      spring.datasource.password: "${POSTGRES_PASSWORD}"
      spring.datasource.driverClassName: "org.postgresql.Driver"
      
      # JPA/Hibernate configuration
      spring.jpa.properties.hibernate.dialect: "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect"
      spring.jpa.properties.hibernate.search.enabled: "false"
      spring.jpa.properties.hibernate.format_sql: "false"
      spring.jpa.properties.hibernate.show_sql: "false"
      spring.jpa.properties.hibernate.hbm2ddl.auto: "update"
      spring.jpa.properties.hibernate.jdbc.batch_size: "20"
      spring.jpa.properties.hibernate.cache.use_query_cache: "false"
      spring.jpa.properties.hibernate.cache.use_second_level_cache: "false"
      
      # HAPI FHIR configuration
      hapi.fhir.fhir_version: "R4"
      hapi.fhir.server_address: "http://localhost:8080/fhir"
      hapi.fhir.subscription.resthook_enabled: "true"
      hapi.fhir.subscription.websocket_enabled: "true"
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.allow_placeholder_references: "true"
      hapi.fhir.auto_create_placeholder_reference_targets: "true"
      hapi.fhir.enforce_referential_integrity_on_write: "false"
      hapi.fhir.enforce_referential_integrity_on_delete: "false"
      hapi.fhir.default_encoding: "JSON"
      hapi.fhir.etag_support: "ENABLED"
      hapi.fhir.cors.enabled: "true"
      hapi.fhir.cors.allowed_origin_patterns: "*"
      
      # Search and indexing
      hapi.fhir.enable_index_missing_fields: "true"
      hapi.fhir.subscription.email.enabled: "false"
      
      # Bulk export (if needed)
      hapi.fhir.bulk_export_enabled: "true"
      
      # Memory settings
      JAVA_OPTS: "-Xmx2g -Xms1g"
      
    expose:
      - "8080"
    networks:
      - healthsharer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.hapi-fhir.rule=Host(`api.healthsharer.live`)"
      - "traefik.http.routers.hapi-fhir.entrypoints=websecure"
      - "traefik.http.routers.hapi-fhir.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hapi-fhir.middlewares=cors-config"
      - "traefik.http.services.hapi-fhir.loadbalancer.server.port=8080"
  vault:
    image: hashicorp/vault
    container_name: kms_vault
    expose:
      - "8200"
    volumes:
    - ./vault/data:/vault/data
    - ./vault/config:/vault/config
    - ./vault/policies:/vault/policies
    - ./vault/logs:/vault/logs
    command: vault server -config=/vault/config/vault.hcl
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.vault.rule=Host(`vault.healthsharer.live`)"
    - "traefik.http.routers.vault.entrypoints=websecure"
    - "traefik.http.routers.vault.tls.certresolver=letsencrypt"
    - "traefik.http.services.vault.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status || exit 0"]  # Modified to not fail if Vault is sealed
      interval: 10s
      timeout: 5s
      retries: 5
    cap_add:
      - IPC_LOCK
    networks:
      - healthsharer
  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: message_queue
    expose:
      - 5672
      - 15672
    volumes:
      - ./rabbitmq/data/:/var/lib/rabbitmq/
      - ./rabbitmq/log/:/var/log/rabbitmq/
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`messagequeue.healthsharer.live`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
      - "traefik.http.routers.rabbitmq.middlewares=cors-config"
      # TCP router for AMQP
      - "traefik.tcp.routers.rabbit-amqp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.rabbit-amqp.entrypoints=amqp"
      - "traefik.tcp.routers.rabbit-amqp.service=rabbit-amqp-svc"
      - "traefik.tcp.services.rabbit-amqp-svc.loadbalancer.server.port=5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthsharer
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs_service     
    ports:
      - "4001:4001"
      - "4001:4001/udp"
    volumes:
      - "./ipfs/staging:/export"
      - "./ipfs/data:/data/ipfs"
    networks:
      - healthsharer
  traefik:
    image: traefik:v3.6.7
    container_name: traefik
    command:
      - "--api.insecure=true"      # Allow insecure access to dashboard
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.amqp.address=:5672"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.http.sanitizepath=false"
      - "--entrypoints.websecure.http.encodequerysemicolons=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=your-email@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "443:443"
      - "3080:8080"  # Dashboard port
      - "5672:5672"  # AMQP port for RabbitMQ
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    labels:
      - "traefik.enable=true"
      # Global CORS middleware
      - "traefik.http.middlewares.cors-config.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST"
      - "traefik.http.middlewares.cors-config.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.cors-config.headers.accesscontrolalloworiginlist=https://healthsharer.live"
      - "traefik.http.middlewares.cors-config.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors-config.headers.addvaryheader=true"
      # Rate limiting middleware
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.burst=10"
      # Dashboard configuration
      - "traefik.http.routers.dashboard.rule=Host(`traefik.healthsharer.live`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.priority=30"
    networks:
      - healthsharer
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    restart: unless-stopped
    networks:
      - healthsharer

  identity:
    image: primeng16/healthsharer:identity-service
    container_name: identity_service
    expose:
      - "5036"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
    networks:
      - healthsharer
    labels:
      - "traefik.enable=true"
      # API endpoints
      #- "traefik.http.routers.identity-api.rule=Host(`api.healthsharer.live`) && PathPrefix(`/users`)"
      #- "traefik.http.routers.identity-api.entrypoints=websecure"
      #- "traefik.http.routers.identity-api.tls.certresolver=letsencrypt"
      #- "traefik.http.routers.identity-api.middlewares=cors-config"
      #- "traefik.http.routers.identity-api.service=identity-api"
      #- "traefik.http.services.identity-api.loadbalancer.server.port=5036"
      # OAuth endpoints on auth subdomain
      - "traefik.http.routers.identity.rule=Host(`auth.healthsharer.live`)"
      - "traefik.http.routers.identity.entrypoints=websecure"
      - "traefik.http.routers.identity.tls.certresolver=letsencrypt"
      - "traefik.http.routers.identity.middlewares=cors-config,auth-ratelimit"
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
  permission:
    image: primeng16/healthsharer:permission-service
    container_name: permission_service
    expose:
      - "5067"
      - "7291"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
    networks:
      - healthsharer
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.permission.rule=Host(`api.healthsharer.live`) && PathPrefix(`/permission`)"
      - "traefik.http.routers.permission.entrypoints=websecure"
      - "traefik.http.routers.permission.tls.certresolver=letsencrypt"
      - "traefik.http.services.permission.loadbalancer.server.port=5067"
      - "traefik.http.routers.permission.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
    restart: unless-stopped
  file:
    image: primeng16/healthsharer:file-service
    container_name: file_service
    expose:
      - "5198"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
      - ClientSecret=${CLIENT_SECRET}
      - Storage:R2:AccessKey=${STORAGE_R2_ACCESS_KEY}
      - Storage:R2:SecretKey=${STORAGE_R2_SECRET_KEY}
    networks:
      - healthsharer
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.file.rule=Host(`api.healthsharer.live`) && PathPrefix(`/file`)"
      - "traefik.http.services.file.loadbalancer.server.port=5198"
      - "traefik.http.routers.file.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
      hapi-fhir-server:
        condition: service_healthy
  fileprocessor:
    image: primeng16/healthsharer:file-process-service
    container_name: file_process_service
    expose:
      - "5126"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
      - Storage:R2:AccessKey=${STORAGE_R2_ACCESS_KEY}
      - Storage:R2:SecretKey=${STORAGE_R2_SECRET_KEY}
    networks:
      - healthsharer
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.fileprocessor.rule=Host(`api.healthsharer.live`) && PathPrefix(`/fileprocessor`)"
      - "traefik.http.services.fileprocessor.loadbalancer.server.port=5126"
      - "traefik.http.routers.fileprocessor.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
    restart: unless-stopped
  notification:
    image: primeng16/healthsharer:notification-service
    container_name: notification_service
    expose:
      - "5282"
    volumes:
      - "./Logs:/app/Logs"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
      - ClientSecret=${CLIENT_SECRET}
    networks:
      - healthsharer
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.notification.rule=Host(`api.healthsharer.live`) && (PathPrefix(`/notification`) || PathPrefix(`/auditlog`))"
      - "traefik.http.services.notification.loadbalancer.server.port=5282"
      - "traefik.http.routers.notification.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
    restart: unless-stopped
  gateway:
    image: primeng16/healthsharer:gateway
    container_name: gateway_service
    expose:
      - "5127"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - healthsharer
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`api.healthsharer.live`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gateway.middlewares=cors-config,api-ratelimit"
      - "traefik.http.services.gateway.loadbalancer.server.port=5127"
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
      hapi-fhir-server:
        condition: service_healthy
  collaboration:
    image: primeng16/healthsharer:collaboration-service
    container_name: collaboration_service
    expose:
      - "5070"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
      - StreamChat_ApiKey=${STREAM_CHAT_API_KEY}
      - StreamChat_ApiSecret=${STREAM_CHAT_API_SECRET}
      - Daily_ApiKey=${DAILY_API_KEY}
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.collaboration.rule=Host(`api.healthsharer.live`) && PathPrefix(`/collaboration`)"
      - "traefik.http.services.collaboration.loadbalancer.server.port=5070"
      - "traefik.http.routers.collaboration.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
    networks:
      - healthsharer
  kms:
    image: primeng16/healthsharer:key-management-service
    container_name: kms_service
    expose:
      - "5088"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
      - Vault_Role=${VAULT_ROLE}
      - Vault_Secret=${VAULT_SECRET}
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.kms.rule=Host(`api.healthsharer.live`) && PathPrefix(`/kms`)"
      - "traefik.http.services.kms.loadbalancer.server.port=5088"
      - "traefik.http.routers.kms.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      vault:
        condition: service_healthy
      ipfs:
        condition: service_started
    networks:
      - healthsharer
  payment:
    image: primeng16/healthsharer:payment-service
    container_name: payment_service
    expose:
      - "5077"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MessageQueue_HostName=${MESSAGE_QUEUE_HOSTNAME}
      - MessageQueue_Username=${MESSAGE_QUEUE_USERNAME}
      - MessageQueue_Password=${MESSAGE_QUEUE_PASSWORD}
      - VNPay:TmnCode=${TMN_CODE}
      - VNPay:HashSecret=${HASH_SECRET}
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.payment.rule=Host(`api.healthsharer.live`) && PathPrefix(`/payments`)"
      - "traefik.http.services.payment.loadbalancer.server.port=5077"
      - "traefik.http.routers.payment.middlewares=cors-config"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthsharer
  webapp:
    image: primeng16/healthsharer:webapp
    container_name: webapp_service
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - healthsharer
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webapp.rule=Host(`healthsharer.live`)"
      - "traefik.http.services.webapp.loadbalancer.server.port=3000"
      - "traefik.http.routers.webapp.entrypoints=websecure"
      - "traefik.http.routers.webapp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webapp.priority=100"
    restart: unless-stopped
networks:
  healthsharer:
    external: true